<!DOCTYPE html>
<html>
<head>
  <title>Simple Image Gallery</title>
  <style>
    body { margin:0; font-family:Arial; background:#f2f2f2; }
    h1 { background:#6200ee; color:white; padding:15px; margin:0; text-align:center; }
    .grid {
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      padding:10px;
    }
    .grid img {
      width:100%;
      height:110px;
      object-fit:cover;
      border-radius:8px;
      cursor:pointer;
    }
    .viewer {
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.95);
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
    .viewer img {
      max-width:95%;
      max-height:80%;
      border-radius:10px;
    }
    .close {
      color:white;
      font-size:22px;
      margin-top:20px;
      background:#6200ee;
      padding:10px 25px;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h1>Simple Image Gallery</h1>

<div class="grid" id="gallery"></div>

<div class="viewer" id="viewer">
  <img id="bigImage">
  <div class="close" onclick="closeImage()">Back to Gallery</div>
</div>

<script>
  const images = [
    "https://picsum.photos/id/1015/400/300",
    "https://picsum.photos/id/1016/400/300",
    "https://picsum.photos/id/1018/400/300",
    "https://picsum.photos/id/1020/400/300",
    "https://picsum.photos/id/1024/400/300",
    "https://picsum.photos/id/1025/400/300",
    "https://picsum.photos/id/1035/400/300",
    "https://picsum.photos/id/1036/400/300",
    "https://picsum.photos/id/1039/400/300",
    "https://picsum.photos/id/1040/400/300",
    "https://picsum.photos/id/1041/400/300",
    "https://picsum.photos/id/1042/400/300",
    "https://picsum.photos/id/1043/400/300",
    "https://picsum.photos/id/1044/400/300",
    "https://picsum.photos/id/1045/400/300",
    "https://picsum.photos/id/1047/400/300",
    "https://picsum.photos/id/1050/400/300",
    "https://picsum.photos/id/1051/400/300",
    "https://picsum.photos/id/1052/400/300",
    "https://picsum.photos/id/1060/400/300"
  ];

  const gallery = document.getElementById("gallery");

  images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.onclick = () => openImage(src);
    gallery.appendChild(img);
  });

  function openImage(src) {
    document.getElementById("bigImage").src = src;
    document.getElementById("viewer").style.display = "flex";
  }

  function closeImage() {
    document.getElementById("viewer").style.display = "none";
  }
</script>

</body>
</html>
